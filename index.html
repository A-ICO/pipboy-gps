<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pip GPS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="pip">
    <nav>STAT&nbsp;&nbsp;INV&nbsp;&nbsp;DATA&nbsp;&nbsp;<b>MAP</b>&nbsp;&nbsp;RADIO</nav>
    <section class="quest">
      <div class="arrow">▲</div>
      <div><strong id="instruction">GPS EN ATTENTE</strong><br><span id="distance">-- m</span></div>
    </section>
    <img id="mascot" src="assets/mascot-thumb.gif" />
    <section class="stats">
      <div>PV <span id="pv">89</span>/100 <meter min="0" max="100" value="89"></meter></div>
      <div>PA <span id="pa">78</span>/100 <meter min="0" max="100" value="78"></meter></div>
      <div>VIT <span id="speed">0.0</span> m/s</div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
